<div class="login-wrapper">
  <div class="login-card">

    <!-- ===================== LOGIN VIEW ===================== -->
    <ng-container *ngIf="!showForgotPassword">
      <h2 class="title">Sign In</h2>
      <p class="subtitle">Access your patient dashboard</p>

      <div class="success-box" *ngIf="resetSuccessMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        {{ resetSuccessMessage }}
      </div>

      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="example@mail.com"
            (ngModelChange)="onInputChange()"
            required
          />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter password"
            (ngModelChange)="onInputChange()"
            required
          />
        </div>

        <div class="forgot-link-wrapper">
          <button type="button" class="forgot-link" (click)="openForgotPassword()">
            Forgot password?
          </button>
        </div>

        <button class="btn-login" type="submit" [disabled]="loading">
          {{ loading ? 'Please wait...' : 'Login' }}
        </button>
      </form>

      <p class="signup-text">
        New user? <a routerLink="/signup">Create an account</a>
      </p>
    </ng-container>

    <!-- ================ FORGOT PASSWORD VIEW ================ -->
    <ng-container *ngIf="showForgotPassword">
      <button type="button" class="back-btn" (click)="backToLogin()">
        &#8592; Back to Sign In
      </button>

      <h2 class="title">Reset Password</h2>
      <p class="subtitle">
        Enter your registered email and we'll send you a link to reset your password.
      </p>

      <div class="error-box" *ngIf="forgotErrorMessage">
        {{ forgotErrorMessage }}
      </div>

      <div class="success-box" *ngIf="forgotSuccessMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        {{ forgotSuccessMessage }}
      </div>

      <form (ngSubmit)="onForgotPassword()" *ngIf="!forgotSuccessMessage">
        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="forgotEmail"
            name="forgotEmail"
            placeholder="example@mail.com"
            (ngModelChange)="onForgotInputChange()"
            required
          />
        </div>

        <button class="btn-login" type="submit" [disabled]="forgotLoading">
          {{ forgotLoading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>

      <div *ngIf="forgotSuccessMessage" style="margin-top: 20px;">
        <button type="button" class="btn-login" (click)="backToLogin()">
          Back to Sign In
        </button>
      </div>

    </ng-container>

  </div>
</div>
