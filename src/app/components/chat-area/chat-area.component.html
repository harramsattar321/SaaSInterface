<div class="chat-area">
  <!-- Model Name Header (Top-Left Corner) -->
  <div class="model-header">
    <span class="model-badge">{{ getModelDisplayName() }}</span>
  </div>

  <!-- Messages Container -->
  <div class="messages-container">
    <!-- Welcome Message (when no messages) -->
    <div class="welcome-message" *ngIf="messages.length === 0">
      <h2>How can I help you today?</h2>
      <p>Start a conversation by typing a message below</p>
    </div>
    <!-- Messages List -->
    <div class="messages-list" *ngIf="messages.length > 0">
      <div *ngFor="let message of messages"
           [class.user-message]="message.isUser"
           [class.ai-message]="!message.isUser"
           class="message-wrapper">
        <!-- Message Bubble -->
        <div class="message-bubble">
          <!-- File Preview in Message (if file exists) -->
          <div *ngIf="message.file" class="message-file-preview">
            <div class="message-file-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" stroke-width="2"/>
                <polyline points="13 2 13 9 20 9" stroke-width="2"/>
              </svg>
            </div>
            <div class="message-file-info">
              <div class="message-file-name">{{ message.file.name }}</div>
              <div class="message-file-size">{{ formatFileSize(message.file.size) }}</div>
            </div>
          </div>
          
          <p class="message-text" *ngIf="message.text">{{ message.text }}</p>
          <div class="message-actions">
            <!-- AI message actions -->
            <ng-container *ngIf="!message.isUser">
              <button class="action-btn" (click)="copyMessage(message.text)"><svg width="20px" height="20px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="Edit / Copy">
                <path id="Vector" d="M9 9V6.2002C9 5.08009 9 4.51962 9.21799 4.0918C9.40973 3.71547 9.71547 3.40973 10.0918 3.21799C10.5196 3 11.0801 3 12.2002 3H17.8002C18.9203 3 19.4801 3 19.9079 3.21799C20.2842 3.40973 20.5905 3.71547 20.7822 4.0918C21.0002 4.51962 21.0002 5.07967 21.0002 6.19978V11.7998C21.0002 12.9199 21.0002 13.48 20.7822 13.9078C20.5905 14.2841 20.2839 14.5905 19.9076 14.7822C19.4802 15 18.921 15 17.8031 15H15M9 9H6.2002C5.08009 9 4.51962 9 4.0918 9.21799C3.71547 9.40973 3.40973 9.71547 3.21799 10.0918C3 10.5196 3 11.0801 3 12.2002V17.8002C3 18.9203 3 19.4801 3.21799 19.9079C3.40973 20.2842 3.71547 20.5905 4.0918 20.7822C4.5192 21 5.07899 21 6.19691 21H11.8036C12.9215 21 13.4805 21 13.9079 20.7822C14.2842 20.5905 14.5905 20.2839 14.7822 19.9076C15 19.4802 15 18.921 15 17.8031V15M9 9H11.8002C12.9203 9 13.4801 9 13.9079 9.21799C14.2842 9.40973 14.5905 9.71547 14.7822 10.0918C15 10.5192 15 11.079 15 12.1969L15 15" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
                </svg></button>
              <!-- Like Button -->

            </ng-container>
            <!-- User message edit -->
            <!-- Edit Icon for user messages -->
<button *ngIf="message.isUser"
class="edit-icon-btn"
(click)="startEdit(message)">
<svg width="20px" height="20px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path fill-rule="evenodd" clip-rule="evenodd" 
  d="M8.56078 20.2501L20.5608 8.25011L15.7501 3.43945L3.75012 15.4395V20.2501H8.56078ZM15.7501 5.56077L18.4395 8.25011L16.5001 10.1895L13.8108 7.50013L15.7501 5.56077ZM12.7501 8.56079L15.4395 11.2501L7.93946 18.7501H5.25012L5.25012 16.0608L12.7501 8.56079Z" 
  fill="#080341"/>
</svg>
</button>

          </div>
        </div>
        <!-- Edit Mode -->
        <div *ngIf="isEditing && editingMessageId === message.id" class="edit-mode">
          <textarea [(ngModel)]="editingText" (keydown)="onEditKeyPress($event)"></textarea>
          <div class="edit-actions">
            <button class="save-btn" (click)="saveEdit()">Save</button>
            <button class="cancel-btn" (click)="cancelEdit()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FILE PREVIEW AREA (Shows above input when file is selected) -->
  <div *ngIf="selectedFile" class="file-preview-container">
    <div class="file-preview-card">
      <div class="file-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" stroke-width="2"/>
          <polyline points="13 2 13 9 20 9" stroke-width="2"/>
        </svg>
      </div>
      <div class="file-info">
        <div class="file-name">{{ selectedFile.name }}</div>
        <div class="file-size">{{ formatFileSize(selectedFile.size) }}</div>
      </div>
      <button class="file-remove-btn" (click)="removeFile()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="18" y1="6" x2="6" y2="18" stroke-width="2"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke-width="2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div class="input-container">
      <!-- LEFT SIDE ICONS -->
      <div class="input-actions-left">
        <!-- + ICON -->
        <button class="file-btn" (click)="fileInput.click()" *ngIf="!isRecording">
          <svg width="20" height="20" stroke="currentColor" fill="none">
            <path d="M12 5v14M5 12h14" stroke-width="2"/>
          </svg>
        </button>
        <input type="file" #fileInput (change)="onFileSelect($event)" style="display:none" />
      </div>

      <!-- TEXT INPUT (Hidden during recording) -->
      <textarea
        *ngIf="!isRecording"
        [(ngModel)]="userInput"
        (keydown)="onKeyPress($event)"
        placeholder="Type Here..."
        class="chat-input"
        rows="1">
      </textarea>

      <!-- VOICE RECORDING UI (Shows during recording) -->
      <div *ngIf="isRecording" class="voice-recording-container">
        <button class="delete-recording-btn" (click)="cancelRecording()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="3 6 5 6 21 6" stroke-width="2"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke-width="2"/>
          </svg>
        </button>
        
        <div class="voice-visualizer">
          <div class="frequency-bars">
            <div class="bar" [style.height]="bar + '%'" *ngFor="let bar of frequencyBars"></div>
          </div>
        </div>
        
        <div class="recording-timer">{{ recordingTime }}</div>
      </div>

      <!-- RIGHT SIDE ICONS -->
      <div class="input-actions">
        <!-- Voice Button (Microphone icon when not recording, Send icon when recording) -->
        <button class="voice-btn" 
                [class.recording]="isRecording"
                (click)="toggleVoiceRecording()">
          <svg *ngIf="!isRecording" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke-width="2"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke-width="2"/>
            <line x1="12" y1="19" x2="12" y2="23" stroke-width="2"/>
            <line x1="8" y1="23" x2="16" y2="23" stroke-width="2"/>
          </svg>
          <svg *ngIf="isRecording" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
        
        <!-- Send Button (Only shows when text or file is present and not recording) -->
        <button *ngIf="!isRecording" 
                class="send-btn"
                (click)="sendMessage()"
                [disabled]="userInput.trim()==='' && !selectedFile">
          ➤
        </button>
      </div>
    </div>
  </div>
</div>
