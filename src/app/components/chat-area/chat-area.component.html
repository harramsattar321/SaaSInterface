<div class="chat-area">
  
  <!-- Messages Container -->
  <div class="messages-container">
    
    <!-- Welcome Message (when no messages) -->
    <div class="welcome-message" *ngIf="messages.length === 0">
      <h2>How can I help you today?</h2>
      <p>Start a conversation by typing a message below</p>
    </div>

    <!-- Messages List -->
    <div class="messages-list" *ngIf="messages.length > 0">
      <div *ngFor="let message of messages" 
           [class.user-message]="message.isUser"
           [class.ai-message]="!message.isUser"
           class="message-wrapper">
        
        <!-- Message Bubble -->
        <div class="message-bubble">
          <p class="message-text">{{ message.text }}</p>
          
          <!-- Action Buttons Row -->
          <div class="message-actions">
            <!-- For AI Messages: Copy, Like, Dislike -->
            <ng-container *ngIf="!message.isUser">
              <button class="action-btn" (click)="copyMessage(message.text)" title="Copy">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
              
              <button class="action-btn" (click)="likeMessage(message)" title="Like">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
                </svg>
              </button>
              
              <button class="action-btn" (click)="dislikeMessage(message)" title="Dislike">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path>
                </svg>
              </button>
            </ng-container>

            <!-- For User Messages: Edit Button -->
            <button *ngIf="message.isUser" 
                    class="action-btn" 
                    (click)="startEdit(message)"
                    title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Edit Mode (Below Message) -->
        <div *ngIf="isEditing && editingMessageId === message.id" class="edit-mode">
          <textarea 
            [(ngModel)]="editingText"
            (keydown)="onEditKeyPress($event)"
            class="edit-textarea"
            rows="3"></textarea>
          <div class="edit-actions">
            <button class="save-btn" (click)="saveEdit()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              Save & Submit
            </button>
            <button class="cancel-btn" (click)="cancelEdit()">Cancel</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-container">
      <textarea 
        [(ngModel)]="userInput"
        (keydown)="onKeyPress($event)"
        placeholder="Message ChatGPT..."
        class="chat-input"
        rows="1"></textarea>
      
      <div class="input-actions">
        <!-- Voice Button -->
        <button class="voice-btn" (click)="startVoiceInput()" title="Voice Input">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>

        <!-- Send Button -->
        <button 
          class="send-btn" 
          (click)="sendMessage()"
          [disabled]="userInput.trim() === ''">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>
