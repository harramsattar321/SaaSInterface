<div class="chat-area">

  <div class="chat-topbar">
    <div class="chat-topbar-left">
      <div class="chat-topbar-title">
        <div class="topbar-robot-dot"></div>
        AI Assistant
      </div>
    </div>
    <div class="chat-topbar-right">
      <button class="topbar-btn" (click)="goToBookAppointment()" title="Book Appointment">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="12" y1="14" x2="12" y2="18"/>
          <line x1="10" y1="16" x2="14" y2="16"/>
        </svg>
        Book Appointment
      </button>
      <button class="topbar-btn topbar-btn-primary" (click)="goToDashboard()" title="Dashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </button>
    </div>
  </div>

  <div class="messages-container">
    
    <!-- WELCOME STATE — only shown when no messages -->
    <div class="welcome-message" *ngIf="messages.length === 0">
      
      <div class="welcome-robot-wrap">
        <img src="chat-robot.png" alt="Assistant" class="welcome-robot" />
      </div>

      <h2 class="welcome-title">How can I help you today?</h2>
      <p class="welcome-sub">Ask me anything about your health, appointments, or insurance.</p>

      <div class="quick-action-cards">

        <button class="quick-card" (click)="goToDashboard()">
          <div class="quick-card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </div>
          <div class="quick-card-text">
            <span class="quick-card-title">My Dashboard</span>
            <span class="quick-card-desc">View appointments, history & stats</span>
          </div>
        </button>

        <button class="quick-card" (click)="goToBookAppointment()">
          <div class="quick-card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="12" y1="14" x2="12" y2="18"/>
              <line x1="10" y1="16" x2="14" y2="16"/>
            </svg>
          </div>
          <div class="quick-card-text">
            <span class="quick-card-title">Book Appointment</span>
            <span class="quick-card-desc">Find a doctor &amp; pick a time slot</span>
          </div>
        </button>

      </div>

      <div class="welcome-suggestions">
        <span class="suggestions-label">Or try asking:</span>
        <div class="suggestion-chips">
          <button class="chip" (click)="sendSuggestion('What doctors are available this week?')">What doctors are available this week?</button>
          <button class="chip" (click)="sendSuggestion('How do I reschedule my appointment?')">How do I reschedule my appointment?</button>
          <button class="chip" (click)="sendSuggestion('Which insurance providers are accepted here?')">Which insurance providers are accepted here?</button>
        </div>
      </div>

    </div>

    <!-- MESSAGES LIST — unchanged -->
    <div class="messages-list" *ngIf="messages.length > 0">
      <div *ngFor="let message of messages"
           [class.user-message]="message.isUser"
           [class.ai-message]="!message.isUser"
           class="message-wrapper">
        
        <div class="message-bubble">
          <p class="message-text" *ngIf="message.text">{{ message.text }}</p>
        </div>

        <div class="message-footer">
          <div class="message-actions-external">
            <ng-container *ngIf="!message.isUser">
              <button class="action-btn-external" (click)="copyMessage(message.text)" title="Copy">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <g id="Edit / Copy">
                    <path id="Vector" d="M9 9V6.2002C9 5.08009 9 4.51962 9.21799 4.0918C9.40973 3.71547 9.71547 3.40973 10.0918 3.21799C10.5196 3 11.0801 3 12.2002 3H17.8002C18.9203 3 19.4801 3 19.9079 3.21799C20.2842 3.40973 20.5905 3.71547 20.7822 4.0918C21.0002 4.51962 21.0002 5.07967 21.0002 6.19978V11.7998C21.0002 12.9199 21.0002 13.48 20.7822 13.9078C20.5905 14.2841 20.2839 14.5905 19.9076 14.7822C19.4802 15 18.921 15 17.8031 15H15M9 9H6.2002C5.08009 9 4.51962 9 4.0918 9.21799C3.71547 9.40973 3.40973 9.71547 3.21799 10.0918C3 10.5196 3 11.0801 3 12.2002V17.8002C3 18.9203 3 19.4801 3.21799 19.9079C3.40973 20.2842 3.71547 20.5905 4.0918 20.7822C4.5192 21 5.07899 21 6.19691 21H11.8036C12.9215 21 13.4805 21 13.9079 20.7822C14.2842 20.5905 14.5905 20.2839 14.7822 19.9076C15 19.4802 15 18.921 15 17.8031V15M9 9H11.8002C12.9203 9 13.4801 9 13.9079 9.21799C14.2842 9.40973 14.5905 9.71547 14.7822 10.0918C15 10.5192 15 11.079 15 12.1969L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </g>
                </svg>
              </button>
              
              <button class="action-btn-external" (click)="likeMessage(message)" title="Like">
                <ng-container *ngIf="!message.liked">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12.444 1.35396C11.6474 0.955692 10.6814 1.33507 10.3687 2.16892L7.807 9.00001L4 9.00001C2.34315 9.00001 1 10.3432 1 12V20C1 21.6569 2.34315 23 4 23H18.3737C19.7948 23 21.0208 22.003 21.3107 20.6119L22.9773 12.6119C23.3654 10.7489 21.9433 9.00001 20.0404 9.00001H14.8874L15.6259 6.7846C16.2554 4.89615 15.4005 2.8322 13.62 1.94198L12.444 1.35396ZM9.67966 9.70225L12.0463 3.39119L12.7256 3.73083C13.6158 4.17595 14.0433 5.20792 13.7285 6.15215L12.9901 8.36755C12.5584 9.66261 13.5223 11 14.8874 11H20.0404C20.6747 11 21.1487 11.583 21.0194 12.204L20.8535 13H17C16.4477 13 16 13.4477 16 14C16 14.5523 16.4477 15 17 15H20.4369L20.0202 17H17C16.4477 17 16 17.4477 16 18C16 18.5523 16.4477 19 17 19H19.6035L19.3527 20.204C19.2561 20.6677 18.8474 21 18.3737 21H8V10.9907C8.75416 10.9179 9.40973 10.4221 9.67966 9.70225ZM6 11H4C3.44772 11 3 11.4477 3 12V20C3 20.5523 3.44772 21 4 21H6V11Z" fill="currentColor"/>
                  </svg>
                </ng-container>
                <ng-container *ngIf="message.liked">
                  <svg width="18" height="18" viewBox="0 -0.5 21 21" version="1.1" xmlns="http://www.w3.org/2000/svg">
                    <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                      <g id="Dribbble-Light-Preview" transform="translate(-259.000000, -760.000000)" fill="currentColor">
                        <g id="icons" transform="translate(56.000000, 160.000000)">
                          <path d="M203,620 L207.200006,620 L207.200006,608 L203,608 L203,620 Z M223.924431,611.355 L222.100579,617.89 C221.799228,619.131 220.638976,620 219.302324,620 L209.300009,620 L209.300009,608.021 L211.104962,601.825 C211.274012,600.775 212.223214,600 213.339366,600 C214.587817,600 215.600019,600.964 215.600019,602.153 L215.600019,608 L221.126177,608 C222.97313,608 224.340232,609.641 223.924431,611.355 L223.924431,611.355 Z" id="like-[#1385]"></path>
                        </g>
                      </g>
                    </g>
                  </svg>
                </ng-container>
              </button>

              <button class="action-btn-external" (click)="dislikeMessage(message)" title="Dislike">
                <ng-container *ngIf="!message.disliked">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M11.556 22.646C12.3525 23.0443 13.3186 22.6649 13.6313 21.8311L16.193 15L20 15C21.6568 15 23 13.6569 23 12L23 4C23 2.34315 21.6568 1 20 1L5.62625 1C4.20523 1 2.97914 1.99698 2.68931 3.38814L1.02265 11.3881C0.634535 13.2511 2.05665 15 3.95959 15H9.11255L8.37409 17.2154C7.7446 19.1039 8.59952 21.1678 10.38 22.058L11.556 22.646ZM14.3203 14.2978L11.9537 20.6088L11.2744 20.2692C10.3842 19.8241 9.95671 18.7921 10.2715 17.8479L11.0099 15.6325C11.4416 14.3374 10.4777 13 9.11256 13H3.95959C3.32527 13 2.85124 12.417 2.98061 11.7961L3.14645 11L6.99998 11C7.55226 11 7.99998 10.5523 7.99998 10C7.99998 9.44772 7.55226 9.00001 6.99998 9.00001L3.56312 9.00001L3.97978 7.00001L6.99998 7.00001C7.55226 7.00001 7.99998 6.55229 7.99998 6.00001C7.99998 5.44772 7.55226 5.00001 6.99998 5.00001L4.39645 5.00001L4.64727 3.79605C4.74388 3.33233 5.15258 3 5.62625 3L16 3L16 13.0093C15.2458 13.0821 14.5903 13.5779 14.3203 14.2978ZM18 13H20C20.5523 13 21 12.5523 21 12L21 4C21 3.44772 20.5523 3 20 3L18 3L18 13Z" fill="currentColor"/>
                  </svg>
                </ng-container>
                <ng-container *ngIf="message.disliked">
                  <svg width="18" height="18" viewBox="0 -0.5 21 21" version="1.1" xmlns="http://www.w3.org/2000/svg">
                    <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                      <g id="Dribbble-Light-Preview" transform="translate(-179.000000, -760.000000)" fill="currentColor">
                        <g id="icons" transform="translate(56.000000, 160.000000)">
                          <path d="M139.800374,612 L144.00037,612 L144.00037,600 L139.800374,600 L139.800374,612 Z M127.698085,600 L137.700376,600 L137.700376,611.979 L135.894378,618.174 C135.725328,619.224 134.776129,620 133.66103,620 C132.412581,620 131.400381,619.036 131.400381,617.847 L131.400381,612 L125.873186,612 C124.026238,612 122.659139,610.358 123.074939,608.644 L124.899837,602.109 C125.200137,600.868 126.360386,600 127.698085,600 L127.698085,600 Z" id="dislike-[#1387]"></path>
                        </g>
                      </g>
                    </g>
                  </svg>
                </ng-container>
              </button>
            </ng-container>
            
            <ng-container *ngIf="message.isUser">
              <button class="action-btn-external" (click)="copyMessage(message.text)" title="Copy">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <g id="Edit / Copy">
                    <path id="Vector" d="M9 9V6.2002C9 5.08009 9 4.51962 9.21799 4.0918C9.40973 3.71547 9.71547 3.40973 10.0918 3.21799C10.5196 3 11.0801 3 12.2002 3H17.8002C18.9203 3 19.4801 3 19.9079 3.21799C20.2842 3.40973 20.5905 3.71547 20.7822 4.0918C21.0002 4.51962 21.0002 5.07967 21.0002 6.19978V11.7998C21.0002 12.9199 21.0002 13.48 20.7822 13.9078C20.5905 14.2841 20.2839 14.5905 19.9076 14.7822C19.4802 15 18.921 15 17.8031 15H15M9 9H6.2002C5.08009 9 4.51962 9 4.0918 9.21799C3.71547 9.40973 3.40973 9.71547 3.21799 10.0918C3 10.5196 3 11.0801 3 12.2002V17.8002C3 18.9203 3 19.4801 3.21799 19.9079C3.40973 20.2842 3.71547 20.5905 4.0918 20.7822C4.5192 21 5.07899 21 6.19691 21H11.8036C12.9215 21 13.4805 21 13.9079 20.7822C14.2842 20.5905 14.5905 20.2839 14.7822 19.9076C15 19.4802 15 18.921 15 17.8031V15M9 9H11.8002C12.9203 9 13.4801 9 13.9079 9.21799C14.2842 9.40973 14.5905 9.71547 14.7822 10.0918C15 10.5192 15 11.079 15 12.1969L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </g>
                </svg>
              </button>

              <button class="action-btn-external edit-icon-btn"
                      (click)="startEdit(message)"
                      title="Edit">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd" clip-rule="evenodd" 
                    d="M8.56078 20.2501L20.5608 8.25011L15.7501 3.43945L3.75012 15.4395V20.2501H8.56078ZM15.7501 5.56077L18.4395 8.25011L16.5001 10.1895L13.8108 7.50013L15.7501 5.56077ZM12.7501 8.56079L15.4395 11.2501L7.93946 18.7501H5.25012L5.25012 16.0608L12.7501 8.56079Z" 
                    fill="currentColor"/>
                </svg>
              </button>
            </ng-container>
          </div>

          <div class="message-time">
            {{ message.timestamp | date:'shortTime' }}
          </div>
        </div>

        <div *ngIf="isEditing && editingMessageId === message.id" class="edit-mode">
          <textarea [(ngModel)]="editingText" (keydown)="onEditKeyPress($event)"></textarea>
          <div class="edit-actions">
            <button class="save-btn" (click)="saveEdit()">Save</button>
            <button class="cancel-btn" (click)="cancelEdit()">Cancel</button>
          </div>
        </div>
      </div>
      
      <div *ngIf="isLoading" class="message-wrapper ai-message">
        <div class="message-bubble thinking-bubble">
          <div class="typing-indicator">
            <span class="thinking-text">Thinking</span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-container">
      
      <div class="input-actions-left"> </div>

      <div class="input-wrapper" style="position: relative; flex: 1; display: flex; align-items: center;">
        <textarea
          [(ngModel)]="userInput"
          (keydown)="onKeyPress($event)"
          [placeholder]="isRecording ? 'Recording .....' : 'Type Here...'"
          class="chat-input"
          [style.padding-right]="isRecording ? '130px' : '10px'"
          rows="1">
        </textarea>

        <div *ngIf="isRecording" class="inner-visualizer">
          <span class="recording-timer-inline">{{ recordingTime }}</span>
          <div class="mini-frequency-bars">
            <div class="mini-bar" [style.height]="bar + '%'" *ngFor="let bar of frequencyBars"></div>
          </div>
        </div>
      </div>

      <div class="input-actions">
        <button *ngIf="isRecording" class="delete-recording-btn" (click)="cancelRecording()" title="Cancel Recording">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff4444">
            <polyline points="3 6 5 6 21 6" stroke-width="2"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke-width="2"/>
          </svg>
        </button>

        <button class="voice-btn" 
                [class.recording-active]="isRecording"
                (click)="toggleVoiceRecording()">
          <svg *ngIf="!isRecording" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke-width="2"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke-width="2"/>
            <line x1="12" y1="19" x2="12" y2="23" stroke-width="2"/>
            <line x1="8" y1="23" x2="16" y2="23" stroke-width="2"/>
          </svg>
          <svg *ngIf="isRecording" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect>
          </svg>
        </button>
        
        <button class="send-btn"
                (click)="sendMessage()"
                [disabled]="userInput.trim()==='' && !selectedFile && !isRecording">
          ➤
        </button>
      </div>
    </div>
  </div>
</div>
