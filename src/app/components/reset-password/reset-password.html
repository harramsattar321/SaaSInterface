<div class="reset-wrapper">
    <div class="reset-card">
  
      <!-- Icon -->
      <div class="icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="#0d3b66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
  
      <h2 class="title">Set New Password</h2>
      <p class="subtitle">Choose a strong password for your account</p>
  
      <!-- Error -->
      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
  
      <!-- Success -->
      <div class="success-box" *ngIf="successMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        {{ successMessage }} Redirecting to login...
      </div>
  
      <!-- Form — hide once success -->
      <form (ngSubmit)="onResetPassword()" *ngIf="!successMessage && token">
  
        <div class="input-group">
          <label>New Password</label>
          <div class="input-wrap">
            <input
              [type]="showNew ? 'text' : 'password'"
              [(ngModel)]="newPassword"
              name="newPassword"
              placeholder="Min. 6 characters"
              (ngModelChange)="onInputChange()"
              required
            />
            <button type="button" class="toggle-eye" (click)="toggleShowNew()">
              <svg *ngIf="!showNew" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                   viewBox="0 0 24 24" fill="none" stroke="#0d3b66" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showNew" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                   viewBox="0 0 24 24" fill="none" stroke="#0d3b66" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
  
        <div class="input-group">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <input
              [type]="showConfirm ? 'text' : 'password'"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat your password"
              (ngModelChange)="onInputChange()"
              required
            />
            <button type="button" class="toggle-eye" (click)="toggleShowConfirm()">
              <svg *ngIf="!showConfirm" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                   viewBox="0 0 24 24" fill="none" stroke="#0d3b66" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showConfirm" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                   viewBox="0 0 24 24" fill="none" stroke="#0d3b66" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
  
        <button class="btn-reset" type="submit" [disabled]="loading">
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
  
      </form>
  
      <!-- Invalid token state (no token in URL) -->
      <div *ngIf="!token && !successMessage" style="margin-top: 16px;">
        <a routerLink="/login" class="back-link">← Back to Sign In</a>
      </div>
  
      <p class="login-text" *ngIf="!successMessage">
        Remember your password? <a routerLink="/login">Sign in</a>
      </p>
  
    </div>
  </div>
