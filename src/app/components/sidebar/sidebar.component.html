<div class="sidebar">

  <!-- SEARCH BAR -->
  <input 
    type="text" 
    class="search-input" 
    placeholder="Search chats..." 
    [(ngModel)]="searchText" 
  />

  <!-- New Chat Button -->
  <button class="new-chat-btn" (click)="startNewChat()">
    <span>+ New Chat</span>
  </button>

  <!-- Chat History -->
  <div class="chat-list">
    <div 
      class="chat-item" 
      *ngFor="let chat of filteredChats()" 
      (click)="openChat(chat)"
    >

      <!-- Chat name / rename input -->
      <div class="chat-name-wrapper">
        <input 
          *ngIf="editingChat === chat" 
          type="text" 
          [(ngModel)]="editingChatName"
          (blur)="saveRename(chat)"
          (keyup.enter)="saveRename(chat)"
          (click)="$event.stopPropagation()"
          class="rename-input" 
        />
        <span *ngIf="editingChat !== chat" (dblclick)="startRename(chat)">
          {{ chat }}
        </span>
      </div>

      <!-- Icons on the right -->
      <div class="chat-icons">
        <!-- Edit -->
        <button 
          class="icon-btn rename-btn" 
          (click)="startRename(chat); $event.stopPropagation()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.004 1.004 0 0 0 0-1.42l-2.34-2.34a1.004 1.004 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/>
          </svg>
        </button>
        <!-- Delete -->
        <button 
          class="icon-btn delete-btn" 
          (click)="deleteChat(chat); $event.stopPropagation()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Bottom Section -->
  <div class="bottom">
    
    <!-- === MODEL SWITCHER === -->
    
    <!-- === END MODEL SWITCHER === -->

    <!-- User Info -->
    <div class="user-info" (click)="toggleUserMenu()">
      <div class="user-avatar">{{ userInitials }}</div>
      <div class="user-name">{{ userName }}</div>
    </div>

    <!-- Dropdown Menu -->
    <div class="user-menu" *ngIf="userMenuOpen">
      <!-- Settings -->
      <div class="menu-item" (click)="openSettings()">
        <span class="menu-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 5 15.4a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 5a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19 9c.17 0 .34.02.51.05A2 2 0 1 1 21 13h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="menu-text">Settings</span>
      </div>
      
      <!-- Log out -->
      <div class="menu-item" (click)="logOut()">
        <span class="menu-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </span>
        <span class="menu-text">Log out</span>
      </div>
    </div>

  </div>

</div>

<!-- Settings Modal -->
<div class="modal-overlay" *ngIf="showSettingsModal" (click)="closeSettingsModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <!-- Modal Header -->
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="close-btn" (click)="closeSettingsModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="modal-body">
      <form class="settings-form">
        
        <!-- Name Field -->
        <div class="form-group">
          <label for="name">Full Name</label>
          <input 
            type="text" 
            id="name" 
            [(ngModel)]="settingsForm.name" 
            name="name"
            placeholder="Enter your full name"
            required
          />
        </div>

        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="settingsForm.email" 
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <!-- Phone Field -->
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input 
            type="tel" 
            id="phone" 
            [(ngModel)]="settingsForm.phone" 
            name="phone"
            placeholder="Enter your phone number"
          />
        </div>

        <!-- Bio Field -->
        <div class="form-group">
          <label for="bio">Bio</label>
          <textarea 
            id="bio" 
            [(ngModel)]="settingsForm.bio" 
            name="bio"
            placeholder="Tell us about yourself"
            rows="4"
          ></textarea>
        </div>

      </form>
    </div>

    <!-- Modal Footer -->
    <div class="modal-footer">
      <button class="cancel-btn-modal" (click)="closeSettingsModal()">Cancel</button>
      <button class="save-btn-modal" (click)="saveSettings()">Save Changes</button>
    </div>

  </div>
</div>
